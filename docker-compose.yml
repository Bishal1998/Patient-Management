services:
  db:
    image: postgres:16
    container_name: patient_service_postgres
    environment:
      POSTGRES_DB: patient_service_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - patient_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d patient_service_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  patient-service:
    image: patient-service
    build: ./patient-service
    container_name: patient_service_app
#    ports:
#      - "4000:4000"
## Now, api-gateway will call this service instead of exposing it directly.
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/patient_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true

  billing-service:
    image: billing-service
    build: ./billing-service
    container_name: billing_service_app
    ports:
      - "4001:4001"
      - "9001:9001"
    depends_on:
      patient-service:
        condition: service_started

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka_app
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost 9092" ]
      interval: 5s
      timeout: 5s
      retries: 10


  analytics-service:
    image: analytics-service
    build: ./analytics-service
    container_name: analytics_service_app
    ports:
      - "4002:4002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER: org.apache.kafka.common.serialization.StringDeserializer
      SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: org.apache.kafka.common.serialization.ByteArrayDeserializer
    depends_on:
      kafka:
        condition: service_healthy

  api-gateway:
    image: api-gateway
    build: ./api-gateway
    container_name: api_gateway_app
    ports:
      - "4004:4004"
    depends_on:
      patient-service:
        condition: service_started

  auth-db:
    image: postgres:16
    container_name: auth_service_postgres
    environment:
      POSTGRES_DB: auth_service_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5001:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d auth_service_db" ]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    image: auth-service
    build: ./auth-service
    container_name: auth_service_app
    ports:
      - "4005:4005"
    environment:
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
    depends_on:
      auth-db:
        condition: service_healthy




volumes:
  patient_pgdata:
  auth_pgdata:


