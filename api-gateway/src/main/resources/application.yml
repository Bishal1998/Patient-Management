server:
  port: 4004

spring:
  cloud:
    gateway:
      routes:
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
          ## Client -> http://localhost:4000/api/patients
          ## API Gateway -> http://patient-service:4000/patients

        - id: api-docs-patient-route
          uri: http://patient-service:4000
          predicates:
              - Path=/api-docs/patients
          filters:
              - RewritePaths=/api-docs/patients,/v3/api-docs
